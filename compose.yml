services:
  ros:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: mekk4/ros2-jazzy-dev:local
    container_name: mekk4_ros
    network_mode: host
    ipc: host
    tty: true
    stdin_open: true
    devices:
      - /dev/video0:/dev/video0
      - /dev/video1:/dev/video1
      - /dev/media0:/dev/media0
      - /dev/media1:/dev/media1
      - /dev/media2:/dev/media2
      - /dev/media3:/dev/media3
    group_add:
      - "${VIDEO_GID:-44}"

    # Kjør som samme UID/GID som host for å unngå root-eide build-filer i workspace
    user: "${DOCKER_UID:-1000}:${DOCKER_GID:-1000}"

    environment:
      - YOLO_CONFIG_DIR=${YOLO_CONFIG_DIR:-/ws/.ultralytics}
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}

    volumes:
      - ./:/ws:rw
      - /etc/localtime:/etc/localtime:ro

    working_dir: /ws
    command: bash -lc "source /opt/ros/jazzy/setup.bash && exec bash"
