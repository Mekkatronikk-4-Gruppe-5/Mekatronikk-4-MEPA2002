services:
  ros:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: mekk4/ros2-jazzy-dev:local
    container_name: mekk4_ros
    network_mode: host
    ipc: host
    tty: true
    stdin_open: true

    # Kjør som samme UID/GID som host for å unngå root-eide build-filer i workspace
    user: "${DOCKER_UID:-1000}:${DOCKER_GID:-1000}"

    environment:
      - YOLO_CONFIG_DIR=${YOLO_CONFIG_DIR:-/ws/.ultralytics}
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
      - ROS_AUTOMATIC_DISCOVERY_RANGE=${ROS_AUTOMATIC_DISCOVERY_RANGE:-SUBNET}
      - ROS_STATIC_PEERS=${ROS_STATIC_PEERS:-}
      - BLINKA_FORCECHIP=${BLINKA_FORCECHIP:-BCM2XXX}
      - BLINKA_FORCEBOARD=${BLINKA_FORCEBOARD:-RASPBERRY_PI_5}

    devices:
      - /dev/ttyAMA0:/dev/ttyAMA0
      - /dev/i2c-1:/dev/i2c-1
      - /dev/gpiochip0:/dev/gpiochip0

    group_add:
      - "${DOCKER_LIDAR_GID:-20}"
      - "${DOCKER_I2C_GID:-998}"
      - "${DOCKER_GPIO_GID:-997}"
      - "${DOCKER_MEGA_GID:-20}"

    volumes:
      - ./:/ws:rw
      - /etc/localtime:/etc/localtime:ro

    working_dir: /ws
    command: bash -lc "source /opt/ros/jazzy/setup.bash && exec bash"
