ekf_filter_node:
  ros__parameters:
    frequency: 50.0
    sensor_timeout: 0.1
    two_d_mode: true
    publish_tf: true
    publish_acceleration: false
    transform_time_offset: 0.0
    transform_timeout: 0.0
    print_diagnostics: true
    predict_to_current_time: true
    reset_on_time_jump: true

    map_frame: map
    odom_frame: odom
    base_link_frame: chassis
    world_frame: odom

    odom0: /wheel/odom
    odom0_queue_size: 3
    odom0_nodelay: true
    odom0_differential: false
    odom0_relative: false
    odom0_pose_rejection_threshold: 5.0
    odom0_twist_rejection_threshold: 3.0
    # For a tracked/skid-steer base, wheel yaw during pure spin is often poor due to scrub.
    # Let wheel odom provide forward speed, and let the IMU own heading.
    odom0_config: [
      false, false, false,
      false, false, false,
      true,  false, false,
      false, false, false,
      false, false, false
    ]

    imu0: /imu/data
    imu0_queue_size: 5
    imu0_nodelay: true
    imu0_differential: false
    imu0_relative: false
    imu0_remove_gravitational_acceleration: false
    imu0_pose_rejection_threshold: 0.8
    imu0_twist_rejection_threshold: 2.5
    imu0_linear_acceleration_rejection_threshold: 2.5
    # Ignore the BNO085 quaternion until it is verified; use only yaw rate from the gyro.
    imu0_config: [
      false, false, false,
      false, false, false,
      false, false, false,
      false, false, true,
      false, false, false
    ]
