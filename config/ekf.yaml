ekf_filter_node:
  ros__parameters:
    frequency: 30.0
    sensor_timeout: 0.2
    two_d_mode: true
    publish_tf: true
    publish_acceleration: false
    transform_time_offset: 0.0
    transform_timeout: 0.1
    reset_on_time_jump: true

    map_frame: map
    odom_frame: odom
    base_link_frame: chassis
    world_frame: odom

    odom0: /wheel/odom
    odom0_queue_size: 10
    odom0_nodelay: false
    odom0_differential: false
    odom0_relative: false
    odom0_pose_rejection_threshold: 5.0
    odom0_twist_rejection_threshold: 3.0
    odom0_config: [
      true,  true,  false,
      false, false, true,
      true,  false, false,
      false, false, true,
      false, false, false
    ]

    imu0: /imu/data
    imu0_queue_size: 20
    imu0_nodelay: false
    imu0_differential: false
    imu0_relative: false
    imu0_remove_gravitational_acceleration: false
    imu0_pose_rejection_threshold: 0.8
    imu0_twist_rejection_threshold: 2.5
    imu0_linear_acceleration_rejection_threshold: 2.5
    imu0_config: [
      false, false, false,
      false, false, true,
      false, false, false,
      false, false, true,
      false, false, false
    ]
