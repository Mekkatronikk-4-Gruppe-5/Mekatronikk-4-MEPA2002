bt_navigator:
  ros__parameters:
    global_frame: odom
    robot_base_frame: chassis
    odom_topic: /odom
    bt_loop_duration: 10
    default_server_timeout: 20
    wait_for_service_timeout: 1000
    action_server_result_timeout: 900.0
    navigators: ["navigate_to_pose", "navigate_through_poses"]
    navigate_to_pose:
      plugin: "nav2_bt_navigator::NavigateToPoseNavigator"
    navigate_through_poses:
      plugin: "nav2_bt_navigator::NavigateThroughPosesNavigator"
    error_code_names:
      - compute_path_error_code
      - follow_path_error_code

controller_server:
  ros__parameters:
    controller_frequency: 20.0
    costmap_update_timeout: 0.35
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.0
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.2
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]
    use_realtime_priority: false

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.05
      movement_time_allowance: 12.0

    general_goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      stateful: true
      xy_goal_tolerance: 0.12
      yaw_goal_tolerance: 0.25

    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 0.4
      lookahead_dist: 0.55
      min_lookahead_dist: 0.35
      max_lookahead_dist: 0.90
      lookahead_time: 1.5
      use_velocity_scaled_lookahead_dist: true
      min_approach_linear_velocity: 0.03
      approach_velocity_scaling_dist: 0.85
      use_collision_detection: true
      max_allowed_time_to_collision_up_to_carrot: 0.8
      use_regulated_linear_velocity_scaling: true
      use_cost_regulated_linear_velocity_scaling: false
      use_fixed_curvature_lookahead: true
      curvature_lookahead_dist: 0.45
      regulated_linear_scaling_min_radius: 0.60
      regulated_linear_scaling_min_speed: 0.12
      use_rotate_to_heading: true
      allow_reversing: true
      rotate_to_heading_min_angle: 0.35
      max_robot_pose_search_dist: 10.0
      use_interpolation: true
      interpolate_curvature_after_goal: true
      stateful: true

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 10.0
      publish_frequency: 5.0
      global_frame: odom
      robot_base_frame: chassis
      rolling_window: true
      width: 5
      height: 5
      resolution: 0.05
      transform_tolerance: 0.2
      footprint: "[[0.22, 0.14], [0.22, -0.14], [-0.16, -0.14], [-0.16, 0.14]]"
      footprint_padding: 0.03
      plugins: ["obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /lidar
          data_type: "LaserScan"
          clearing: true
          marking: true
          inf_is_valid: true
          obstacle_max_range: 3.0
          obstacle_min_range: 0.0
          raytrace_max_range: 3.5
          raytrace_min_range: 0.0
          max_obstacle_height: 2.0
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.40
      always_send_full_costmap: true

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: chassis
      rolling_window: true
      width: 8
      height: 8
      resolution: 0.05
      transform_tolerance: 0.2
      track_unknown_space: true
      footprint: "[[0.22, 0.14], [0.22, -0.14], [-0.16, -0.14], [-0.16, 0.14]]"
      footprint_padding: 0.03
      plugins: ["obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /lidar
          data_type: "LaserScan"
          clearing: true
          marking: true
          inf_is_valid: true
          obstacle_max_range: 3.0
          obstacle_min_range: 0.0
          raytrace_max_range: 3.5
          raytrace_min_range: 0.0
          max_obstacle_height: 2.0
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.40
      always_send_full_costmap: true

planner_server:
  ros__parameters:
    expected_planner_frequency: 5.0
    costmap_update_timeout: 0.5
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_smac_planner::SmacPlannerLattice"
      tolerance: 0.20
      allow_unknown: true
      max_iterations: 1000000
      max_on_approach_iterations: 1000
      max_planning_time: 2.0
      analytic_expansion_max_cost: 200.0
      analytic_expansion_max_cost_override: false
      reverse_penalty: 1.05
      change_penalty: 0.0
      non_straight_penalty: 1.05
      rotation_penalty: 2.0
      cost_penalty: 2.0
      retrospective_penalty: 0.015
      lookup_table_size: 20.0
      cache_obstacle_heuristic: false
      allow_reverse_expansion: true
      goal_heading_mode: "DEFAULT"
      smooth_path: true
      smoother:
        max_iterations: 1000
        w_smooth: 0.3
        w_data: 0.2
        tolerance: 1.0e-10
        do_refinement: true
        refinement_num: 2

behavior_server:
  ros__parameters:
    local_costmap_topic: local_costmap/costmap_raw
    global_costmap_topic: global_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    global_footprint_topic: global_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "wait"]
    spin:
      plugin: "nav2_behaviors::Spin"
    backup:
      plugin: "nav2_behaviors::BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors::DriveOnHeading"
    wait:
      plugin: "nav2_behaviors::Wait"
    local_frame: odom
    global_frame: odom
    robot_base_frame: chassis
    transform_tolerance: 0.2
    simulate_ahead_time: 1.5
    max_rotational_vel: 0.5
    min_rotational_vel: 0.1
    rotational_acc_lim: 1.5

velocity_smoother:
  ros__parameters:
    smoothing_frequency: 20.0
    scale_velocities: false
    feedback: "OPEN_LOOP"
    max_velocity: [0.5, 0.0, 2.0]
    min_velocity: [-0.5, 0.0, -2.0]
    max_accel: [0.12, 0.0, 0.8]
    max_decel: [-0.12, 0.0, -0.8]
    odom_topic: "odom"
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 0.5

collision_monitor:
  ros__parameters:
    base_frame_id: "chassis"
    odom_frame_id: "odom"
    cmd_vel_in_topic: "cmd_vel_nav_flipped"
    cmd_vel_out_topic: "cmd_vel"
    state_topic: "collision_monitor_state"
    transform_tolerance: 0.2
    source_timeout: 0.5
    base_shift_correction: true
    stop_pub_timeout: 1.0
    polygons: ["FrontStop", "FrontSlow", "FootprintApproach"]
    FrontStop:
      type: "polygon"
      points: "[[0.34, 0.18], [0.34, -0.18], [0.08, -0.18], [0.08, 0.18]]"
      action_type: "stop"
      min_points: 4
      visualize: true
      polygon_pub_topic: "polygon_front_stop"
      enabled: true
    FrontSlow:
      type: "polygon"
      points: "[[0.46, 0.22], [0.46, -0.22], [0.10, -0.22], [0.10, 0.22]]"
      action_type: "slowdown"
      min_points: 4
      slowdown_ratio: 0.55
      visualize: true
      polygon_pub_topic: "polygon_front_slow"
      enabled: true
    FootprintApproach:
      type: "polygon"
      action_type: "approach"
      footprint_topic: "/local_costmap/published_footprint"
      time_before_collision: 0.5
      simulation_time_step: 0.1
      min_points: 6
      visualize: false
      enabled: false
    observation_sources: ["scan"]
    scan:
      type: "scan"
      topic: "/lidar"
      enabled: true
