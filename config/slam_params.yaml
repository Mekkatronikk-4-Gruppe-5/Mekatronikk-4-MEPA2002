slam_toolbox:
  ros__parameters:
    use_sim_time: true
    odom_frame: odom
    base_frame: chassis
    map_frame: map
    scan_topic: /lidar
    map_update_interval: 0.5      # default er ofte tregere
    minimum_time_interval: 0.05   # tillat hyppigere scan-prosessering
    throttle_scans: 1             # ikke dropp scans
    transform_publish_period: 0.02