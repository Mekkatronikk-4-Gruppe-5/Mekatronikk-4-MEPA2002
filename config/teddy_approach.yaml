teddy_approach:
  ros__parameters:
    enabled: true
    status_topic: /teddy_detector/status
    cmd_vel_topic: /cmd_vel_teddy
    publish_period_s: 0.05
    lost_timeout_s: 0.5

    # Centering controller. dx > 0 means teddy is right of image center.
    angular_kp: 1.2
    max_angular_speed: 1.8
    min_angular_speed: 1.0
    center_tolerance: 0.10

    # Stop when YOLO is centered and LiDAR sees something close straight ahead.
    scan_topic: /lidar
    stop_lidar_distance_m: 0.15
    stop_lidar_front_angle_rad: 0.20
    stop_lidar_min_points: 3
    stop_lidar_timeout_s: 0.5
    # Always draw the green LiDAR target sector in RViz.
    visualize_lidar_stop: true
    marker_topic: /teddy_approach/lidar_stop_markers
    # Publish markers in a stable frame with TF to odom.
    marker_frame_id: base_laser
    # Use latest TF in RViz for markers to avoid future-extrapolation warnings.
    marker_use_latest_tf: true

    # Drive forward only after the teddy is centered unless this is true.
    linear_speed: 0.01
    drive_when_not_centered: false

    # Optional Nav2 goal used as a rough teddy search/approach position.
    use_nav_goal: true
    send_goal_on_start: false
    goal_frame: odom
    goal_x: 0.0
    goal_y: 0.0
    goal_yaw: 0.0
